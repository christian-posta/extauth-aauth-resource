listen:
  grpc: ":7070"
  http: ":8080"

jwks_cache:
  success_ttl: 5m
  error_ttl: 30s
  max_entries: 1000

resources:
  - id: mcp-api
    issuer: http://localhost:8080
    hosts:
      - localhost:8080
      - localhost:3001
      - localhost
    signing_key:
      kid: rsk-1
      alg: EdDSA
      private_key_file: resource_key.pem
    signature_window: 60s
    allow_pseudonymous: true
    policy:
      name: default
